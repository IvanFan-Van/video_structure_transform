    <!-- 背景层 -->
    <div id="beat-7-cta-conclusion-bg" class="clip" data-start="0" data-duration="2.6" data-track-index="0" style="position:absolute;inset:0;background:#000000;"></div>
    
    <!-- 装饰径向光晕1 -->
    <div id="beat-7-cta-conclusion-glow-1" class="clip" data-start="0" data-duration="2.6" data-track-index="1" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle, rgba(255,34,34,0.15) 0%, transparent 70%);pointer-events:none;"></div>
    
    <!-- 装饰径向光晕2 -->
    <div id="beat-7-cta-conclusion-glow-2" class="clip" data-start="0" data-duration="2.6" data-track-index="2" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);pointer-events:none;"></div>
    
    <!-- 装饰浮动光点1 -->
    <div id="beat-7-cta-conclusion-dot-1" class="clip" data-start="0" data-duration="2.6" data-track-index="3" style="position:absolute;top:30%;left:20%;width:12px;height:12px;border-radius:50%;background:#FF2222;opacity:0.6;pointer-events:none;"></div>
    
    <!-- 装饰浮动光点2 -->
    <div id="beat-7-cta-conclusion-dot-2" class="clip" data-start="0" data-duration="2.6" data-track-index="4" style="position:absolute;top:70%;right:20%;width:8px;height:8px;border-radius:50%;background:#FFFFFF;opacity:0.4;pointer-events:none;"></div>
    
    <!-- 第一组对比文字：10亿<11亿 -->
    <div id="beat-7-cta-conclusion-text-1" class="clip" data-start="0.1" data-duration="1.4" data-track-index="5" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Serif SC',serif;font-size:88px;font-weight:700;color:#FFFFFF;text-align:center;white-space:nowrap;opacity:0;text-shadow:0 0 32px rgba(255,255,255,0.3);">
      10亿 <span style="color:#FF2222; text-shadow:0 0 32px rgba(255,34,34,0.5);">&lt; 11亿</span>
    </div>
    
    <!-- 第二组对比文字：11亿>10亿 -->
    <div id="beat-7-cta-conclusion-text-2" class="clip" data-start="1.2" data-duration="1.4" data-track-index="6" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Serif SC',serif;font-size:88px;font-weight:700;color:#FFFFFF;text-align:center;white-space:nowrap;opacity:0;text-shadow:0 0 32px rgba(255,255,255,0.3);">
      <span style="color:#FF2222; text-shadow:0 0 32px rgba(255,34,34,0.5);">11亿 &gt;</span> 10亿
    </div>
    
    <!-- 底部品牌水印 -->
    <div id="beat-7-cta-conclusion-watermark" class="clip" data-start="0" data-duration="2.6" data-track-index="7" style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-family:'Noto Sans SC',sans-serif;font-size:28px;font-weight:500;color:#888888;opacity:0.7;">
      wuqr
    </div>
    
    <!-- 全局淡出遮罩 -->
    <div id="beat-7-cta-conclusion-fade-mask" class="clip" data-start="2.1" data-duration="0.5" data-track-index="8" style="position:absolute;inset:0;background:#000000;opacity:0;pointer-events:none;"></div>
  </div>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">

  <script>
    const tl = gsap.timeline({ paused: true });
    const duration = 2.6;

    // 第一组文字入场动画
    tl.fromTo("#beat-7-cta-conclusion-text-1", 
      { opacity: 0, scale: 0.8 },
      { opacity: 1, scale: 1, duration: 0.4, ease: "power3.out" },
      0.1
    );

    // 第一组文字退场交叉淡入第二组文字
    tl.fromTo("#beat-7-cta-conclusion-text-1",
      { opacity: 1 },
      { opacity: 0, duration: 0.3, ease: "power2.out" },
      1.2
    );
    tl.fromTo("#beat-7-cta-conclusion-text-2",
      { opacity: 0, scale: 1.1 },
      { opacity: 1, scale: 1, duration: 0.3, ease: "power2.out" },
      1.2
    );

    // 光晕呼吸 ambient loop
    tl.fromTo("#beat-7-cta-conclusion-glow-1",
      { scale: 1, opacity: 0.8 },
      { scale: 1.3, opacity: 1, duration: 1.2, ease: "sine.inOut", repeat: Math.floor(duration / 1.2) - 1, yoyo: true },
      0
    );
    tl.fromTo("#beat-7-cta-conclusion-glow-2",
      { scale: 1, opacity: 0.7 },
      { scale: 1.2, opacity: 0.9, duration: 1.5, ease: "sine.inOut", repeat: Math.floor(duration / 1.5) - 1, yoyo: true },
      0
    );

    // 光点漂移 ambient loop
    tl.fromTo("#beat-7-cta-conclusion-dot-1",
      { x: 0, y: 0 },
      { x: 30, y: -20, duration: 1.8, ease: "sine.inOut", repeat: Math.floor(duration / 1.8) - 1, yoyo: true },
      0
    );
    tl.fromTo("#beat-7-cta-conclusion-dot-2",
      { x: 0, y: 0 },
      { x: -25, y: 15, duration: 1.4, ease: "sine.inOut", repeat: Math.floor(duration / 1.4) - 1, yoyo: true },
      0
    );

    // 最终全局淡出
    tl.fromTo("#beat-7-cta-conclusion-fade-mask",
      { opacity: 0 },
      { opacity: 1, duration: 0.5, ease: "none" },
      2.1
    );

    window.__timelines = window.__timelines || {};
      window.__timelines["beat-7-cta-conclusion"] = tl;
  </script>
