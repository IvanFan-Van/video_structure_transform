<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .clip {
            position: relative;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: #000;
        }

        .watermark {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 100;
            pointer-events: none;
        }

        .inequality {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            font-weight: 800;
            white-space: nowrap;
            color: white;
            text-align: center;
            opacity: 0;
        }

        .red-num {
            color: #FF3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.6);
        }

        .final-white {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }

        .final-text {
            font-size: 72px;
            font-weight: 800;
            color: #000;
        }

        .final-text .bigger {
            color: #FF3333;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
    <div class="clip" data-start="14.8" data-duration="5.0" data-beat="5">
        <div class="inequality" id="ineq1">10 亿 <span style="color:#FF3333">
                << /span> 11 亿</div>
        <div class="inequality" id="ineq2" style="opacity:0; font-size:64px;">或者说</div>
        <div class="inequality" id="ineq3" style="opacity:0; font-size:80px;"><span class="red-num">11 亿</span> > <span
                class="red-num">10 亿</span></div>
        <div class="final-white" id="finalWhite">
            <div class="final-text"><span class="bigger">11 亿</span> > <span class="bigger">10 亿</span><br><span
                    style="font-size:36px; font-weight:400;">最值钱的数字，多了一个“1”</span></div>
        </div>
        <div class="watermark">✧ 智作 | 你的品牌</div>
    </div>
    <script>
        const tl = gsap.timeline({ repeat: 0, paused: false });
        tl.fromTo("#ineq1", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6, ease: "back.out(1)" });
        tl.to("#ineq1", { opacity: 0, duration: 0.3 }, "+=1.8");
        tl.fromTo("#ineq2", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "+=0.1");
        tl.to("#ineq2", { opacity: 0, duration: 0.3 }, "+=0.8");
        tl.fromTo("#ineq3", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.5, ease: "elastic.out(1, 0.4)" }, "+=0.1");
        tl.to("#ineq3", { opacity: 0, duration: 0.5, delay: 1.2 });
        // 最后白底黑字收尾
        tl.to("#finalWhite", { opacity: 1, duration: 0.5 }, "+=0.2");
        tl.to(".clip", { scale: 0.95, duration: 2, ease: "power1.inOut" }, "-=1");
    </script>
</body>

</html>
