    <div id="beat-4-cta-glow-1" class="clip" data-start="0" data-duration="1.1" data-track-index="1" style="width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(255,238,238,0.6) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>

    <div id="beat-4-cta-deco-dot-2" class="clip" data-start="0" data-duration="1.1" data-track-index="6" style="width: 12px; height: 12px; border-radius: 50%; background: #FF2222; top: 43%; right: 22%;"></div>

    <script>
      const tl = gsap.timeline({ paused: true });
      const totalDuration = 1.1;

      // 整体画面淡入
      tl.fromTo("#beat-4-cta-bg", { opacity: 0 }, { opacity: 1, duration: 0.3, ease: "power3.out" }, 0.1);
      
      // 光晕入场
      tl.fromTo("#beat-4-cta-glow-1", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out" }, 0.15);
      tl.fromTo("#beat-4-cta-glow-2", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "power2.out" }, 0.2);

      // 核心标题入场
      tl.fromTo("#beat-4-cta-main-title", { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out" }, 0.25);
      
      // 副标题入场
      tl.fromTo("#beat-4-cta-subtitle", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 0.35);

      // 装饰光点入场
      tl.fromTo(["#beat-4-cta-deco-dot-1", "#beat-4-cta-deco-dot-2"], { scale: 0 }, { scale: 1, duration: 0.2, ease: "back.out(1.7)" }, 0.4);

      // 核心标题呼吸 ambient 循环
      tl.to("#beat-4-cta-main-title", { 
        scale: 1.05, 
        duration: 0.6, 
        ease: "sine.inOut",
        yoyo: true,
        repeat: Math.floor(totalDuration / 0.6) - 1
      }, 0.5);

      // 光晕漂移 ambient 循环
      tl.to("#beat-4-cta-glow-1", { 
        x: 20, 
        duration: 0.7, 
        ease: "sine.inOut",
        yoyo: true,
        repeat: Math.floor(totalDuration / 0.7) - 1
      }, 0.5);

      // 最终整体淡出收尾
      tl.to(".clip", { opacity: 0, duration: 0.3, ease: "power2.in" }, 0.8);

      window.__timelines = window.__timelines || {};
      window.__timelines["beat-4-cta"] = tl;
    </script>
