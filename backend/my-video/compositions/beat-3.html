<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .clip {
            position: relative;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: #000;
        }

        .watermark {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 100;
            pointer-events: none;
        }

        .text-line {
            position: absolute;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 52px;
            font-weight: 500;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
            opacity: 0;
        }

        .line1 {
            top: 30%;
        }

        .line2 {
            top: 50%;
        }

        .big-number {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 800;
            color: #FF3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.6);
            white-space: nowrap;
            opacity: 0;
        }

        /* glitch 故障动画 */
        @keyframes glitch {
            0% {
                text-shadow: -2px 0 #00FFFF, 2px 0 #FF00FF;
                transform: translate(-50%, -50%) skew(0deg);
            }

            20% {
                text-shadow: 2px 0 #00FFFF, -2px 0 #FF00FF;
                transform: translate(-50%, -50%) skew(2deg);
            }

            40% {
                text-shadow: -3px 0 #00FFFF, 3px 0 #FF00FF;
                transform: translate(-50%, -50%) skew(-2deg);
            }

            60% {
                text-shadow: 3px 0 #00FFFF, -3px 0 #FF00FF;
                transform: translate(-50%, -50%) skew(1deg);
            }

            80% {
                text-shadow: -1px 0 #00FFFF, 1px 0 #FF00FF;
                transform: translate(-50%, -50%) skew(0deg);
            }

            100% {
                text-shadow: 0 0 10px #FF3333;
                transform: translate(-50%, -50%);
            }
        }

        .glitch-active {
            animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
    <div class="clip" data-start="4.8" data-duration="5.0" data-beat="3">
        <div class="text-line line1" id="line1">直到有一天 一个「傻子」回答道</div>
        <div class="text-line line2" id="line2" style="color:#FF3333;">「</div>
        <div class="big-number" id="bigNum">11 亿</div>
        <div class="watermark">✧ 智作 | 你的品牌</div>
    </div>
    <script>
        const tl = gsap.timeline({ repeat: 0, paused: false });
        tl.fromTo("#line1", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" });
        tl.fromTo("#line2", { opacity: 0 }, { opacity: 1, duration: 0.3 }, "+=0.5");
        tl.fromTo("#bigNum", { opacity: 0, scale: 0.5 },
            {
                opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2)", onComplete: () => {
                    document.getElementById("bigNum").classList.add("glitch-active");
                    // 2秒后移除故障循环，但保持最后状态
                    setTimeout(() => {
                        document.getElementById("bigNum").classList.remove("glitch-active");
                    }, 1800);
                }
            }, "+=0.2");
    </script>
</body>

</html>
