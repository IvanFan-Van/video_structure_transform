<template id="beat-5-cta-template">
  <div class="composition" data-composition-id="beat-5-cta" data-width="1080" data-height="1920" style="width: 100%; height: 100%; position: relative; overflow: hidden; font-family: 'Noto Serif SC', serif;">
    <!-- 背景层 -->
    <div id="beat-5-cta-bg" class="clip" data-start="0" data-duration="5.3" data-track-index="0" style="position: absolute; inset: 0; background-color: #000000;"></div>
    
    <!-- 径向柔光光晕装饰 -->
    <div id="beat-5-cta-radial-glow" class="clip" data-start="0" data-duration="5.3" data-track-index="1" style="position: absolute; inset: 0; background: radial-gradient(circle at 50% 45%, rgba(255,32,32,0.12) 0%, transparent 65%); opacity: 0.6;"></div>
    
    <!-- 核心数字 11亿 -->
    <div id="beat-5-cta-num-11yi" class="clip" data-start="0.1" data-duration="1.2" data-track-index="2" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; font-weight: 700; color: #FFFFFF; text-shadow: 0 0 40px rgba(255,255,255,0.8), 0 0 80px rgba(255,32,32,0.4); opacity: 0;">
      11亿
    </div>
    
    <!-- 不等式1 10亿<11亿 -->
    <div id="beat-5-cta-ineq-1" class="clip" data-start="1.3" data-duration="1.2" data-track-index="3" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; font-weight: 700; color: #000000; text-shadow: 0 0 30px rgba(0,0,0,0.6); opacity: 0;">
      10亿 < 11亿
    </div>
    
    <!-- 不等式2 11亿>10亿 -->
    <div id="beat-5-cta-ineq-2" class="clip" data-start="2.5" data-duration="2.8" data-track-index="4" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; font-weight: 700; color: #FFFFFF; text-shadow: 0 0 40px rgba(255,255,255,0.8), 0 0 80px rgba(255,32,32,0.5); opacity: 0;">
      11亿 > 10亿
    </div>
    
    <!-- 红色高亮装饰块 -->
    <div id="beat-5-cta-accent-block" class="clip" data-start="0.1" data-duration="5.3" data-track-index="5" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 120px; background-color: #FF2020; border-radius: 16px; opacity: 0; filter: blur(40px);"></div>
    
    <!-- 漂移光点装饰 -->
    <div id="beat-5-cta-float-dot" class="clip" data-start="0" data-duration="5.3" data-track-index="6" style="position: absolute; top: 30%; left: 20%; width: 12px; height: 12px; background-color: #FF2020; border-radius: 50%; opacity: 0.7;"></div>
    
    <!-- 底部品牌标识 -->
    <div id="beat-5-cta-brand" class="clip" data-start="0" data-duration="5.3" data-track-index="7" style="position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%); font-family: 'UnifrakturMaguntia', serif; font-size: 1rem; color: #F8F8F8; opacity: 0.8;">
      wuqr
    </div>
  </div>

  <script>
    const tl = gsap.timeline({ paused: true });
    const duration = 5.3;

    // 背景闪切动画
    tl.fromTo("#beat-5-cta-bg", { backgroundColor: "#000000" }, { backgroundColor: "#FFFFFF", duration: 0.05, ease: "power1.inOut" }, 0.1);
    tl.fromTo("#beat-5-cta-bg", { backgroundColor: "#FFFFFF" }, { backgroundColor: "#000000", duration: 0.05, ease: "power1.inOut" }, 1.3);
    tl.fromTo("#beat-5-cta-bg", { backgroundColor: "#000000" }, { backgroundColor: "#FFFFFF", duration: 0.05, ease: "power1.inOut" }, 2.5);
    tl.fromTo("#beat-5-cta-bg", { backgroundColor: "#FFFFFF" }, { backgroundColor: "#000000", duration: 0.05, ease: "power1.inOut" }, 3.7);

    // 核心数字入场
    tl.fromTo("#beat-5-cta-num-11yi", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.3, ease: "power3.out" }, 0.1);
    tl.to("#beat-5-cta-num-11yi", { opacity: 0, scale: 1.1, duration: 0.2, ease: "power2.in" }, 1.0);

    // 不等式1 slap入场
    tl.fromTo("#beat-5-cta-ineq-1", { opacity: 0, y: -80 }, { opacity: 1, y: 0, duration: 0.35, ease: "back.out(1.2)" }, 1.3);
    tl.to("#beat-5-cta-ineq-1", { opacity: 0, y: 60, duration: 0.2, ease: "power2.in" }, 2.2);

    // 不等式2弹性入场
    tl.fromTo("#beat-5-cta-ineq-2", { opacity: 0, rotation: -5 }, { opacity: 1, rotation: 0, duration: 0.5, ease: "elastic.out(0.5)" }, 2.5);

    // 红色装饰块呼吸动画
    tl.fromTo("#beat-5-cta-accent-block", { opacity: 0.2, scale: 1 }, { opacity: 0.5, scale: 1.3, duration: 2, ease: "sine.inOut", repeat: Math.floor(duration / 2) - 1, yoyo: true }, 0.1);

    // 径向光晕 ambient loop
    tl.fromTo("#beat-5-cta-radial-glow", { opacity: 0.4 }, { opacity: 0.8, duration: 1.8, ease: "sine.inOut", repeat: Math.floor(duration / 1.8) - 1, yoyo: true }, 0);

    // 漂浮光点漂移动画
    tl.fromTo("#beat-5-cta-float-dot", { x: 0, y: 0 }, { x: 120, y: -80, duration: 3, ease: "sine.inOut", repeat: Math.floor(duration / 3) - 1, yoyo: true }, 0);

    // 最终全局淡出
    tl.to([
      "#beat-5-cta-ineq-2",
      "#beat-5-cta-radial-glow",
      "#beat-5-cta-accent-block",
      "#beat-5-cta-float-dot",
      "#beat-5-cta-brand"
    ], { opacity: 0, duration: 0.5, ease: "power2.in" }, 4.8);

    window.__timelines = window.__timelines || {};
      window.__timelines["beat-5-cta"] = tl;
  </script>
</template>
