<template id="beat-4-proof-template">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@400&family=UnifrakturMaguntia&display=swap');
    .clip {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      box-sizing: border-box;
    }
    .glow-text {
      text-shadow: 0 0 24px rgba(255,255,255,0.35);
    }
    .accent-red {
      color: #FF2020;
    }
  </style>
  <div class="composition" data-composition-id="beat-4-proof" data-width="1080" data-height="1920">
    <!-- 背景层 -->
    <div id="beat-4-proof-bg" class="clip" data-start="0" data-duration="5.0" data-track-index="0" style="background-color: #1A1A1A; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 70%);"></div>
    
    <!-- 主标题 -->
    <div id="beat-4-proof-headline" class="clip" data-start="0" data-duration="5.0" data-track-index="1" style="display: flex; justify-content: center; padding-top: 80px; pointer-events: none;">
      <div class="glow-text" style="font-family: 'Noto Serif SC', serif; font-size: 82px; font-weight: 700; color: #FFFFFF; text-align: center; line-height: 1.3;">11项远超物质财富<br>的人生珍贵资产清单</div>
    </div>

    <!-- 滚动文字视口容器 -->
    <div id="beat-4-proof-scroll-viewport" class="clip" data-start="0" data-duration="5.0" data-track-index="2" style="top: 320px; height: 1200px; display: flex; justify-content: center; overflow: hidden;">
      <div id="beat-4-proof-scroll-content" style="width: 900px; position: absolute; top: 0;">
        <div id="beat-4-proof-item-1" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="1">01</span> 健康无病痛的身体状态</div>
        <div id="beat-4-proof-item-2" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="2">02</span> 发自内心的安全感与平静</div>
        <div id="beat-4-proof-item-3" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="3">03</span> 可以随时深度入睡的睡眠</div>
        <div id="beat-4-proof-item-4" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="4">04</span> 三五知己的深度信任关系</div>
        <div id="beat-4-proof-item-5" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="5">05</span> 对世界保持好奇的感知力</div>
        <div id="beat-4-proof-item-6" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="6">06</span> 不被外界裹挟的独立人格</div>
        <div id="beat-4-proof-item-7" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="7">07</span> 为热爱事物投入的专注力</div>
        <div id="beat-4-proof-item-8" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="8">08</span> 接纳不完美的自我和解</div>
        <div id="beat-4-proof-item-9" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="9">09</span> 对微小幸福的感知能力</div>
        <div id="beat-4-proof-item-10" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="10">10</span> 不受束缚的自由选择权</div>
        <div id="beat-4-proof-item-11" style="font-family: 'Noto Sans SC', sans-serif; font-size: 48px; color: #B0B0B0; margin-bottom: 72px; line-height: 1.6;"><span class="accent-red" data-num="11">11</span> 历经世事仍纯粹的初心</div>
      </div>
    </div>

    <!-- 底部品牌标识 -->
    <div id="beat-4-proof-brand" class="clip" data-start="0" data-duration="5.0" data-track-index="3" style="bottom: 48px; top: auto; height: 40px; display: flex; justify-content: center; align-items: center;">
      <div style="font-family: 'UnifrakturMaguntia', serif; font-size: 28px; color: #F8F8F8; opacity: 0.8;">wuqr</div>
    </div>
  </div>

  <script>
    const tl = gsap.timeline({ paused: true });
    const duration = 5.0;

    // 背景呼吸循环动画
    tl.fromTo("#beat-4-proof-bg", 
      { scale: 1, transformOrigin: "50% 50%" }, 
      { scale: 1.05, duration: 2, ease: "sine.inOut", yoyo: true, repeat: Math.floor(duration / 2) - 1 }, 
      0
    );

    // 标题入场动画
    tl.fromTo("#beat-4-proof-headline", 
      { y: -120, opacity: 0 }, 
      { y: 0, opacity: 1, duration: 0.4, ease: "power3.out" }, 
      0.1
    );

    // 高速向上滚动文字流 1200px/s 5秒总位移6000px
    tl.fromTo("#beat-4-proof-scroll-content", 
      { y: 0 }, 
      { y: -6000, duration: duration, ease: "none" }, 
      0.1
    );

    // 品牌标识入场
    tl.fromTo("#beat-4-proof-brand", 
      { opacity: 0, y: 30 }, 
      { opacity: 0.8, y: 0, duration: 0.3, ease: "back.out(1.3)" }, 
      0.3
    );

    // 条目数字依次高亮动画
    for(let i = 1; i <= 11; i++) {
      const highlightTime = 0.5 + (i * 0.38);
      tl.to(`#beat-4-proof-item-${i}`, 
        { color: "#FFFFFF", duration: 0.15, ease: "power2.out" }, 
        highlightTime
      );
      tl.to(`#beat-4-proof-item-${i}`, 
        { color: "#B0B0B0", duration: 0.15, ease: "power2.in" }, 
        highlightTime + 0.2
      );
    }

    window.__timelines = window.__timelines || {};
      window.__timelines["beat-4-proof"] = tl;
  </script>
</template>
