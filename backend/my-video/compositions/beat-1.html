<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        /* 样式从原 beat-1 复制，并保证 .clip 属性存在 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .clip {
            position: relative;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: #000;
        }

        .watermark {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-family: monospace;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 100;
            pointer-events: none;
        }

        .hook-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: 500;
            white-space: nowrap;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            opacity: 0;
        }

        .white-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }

        .question-gray {
            color: #aaa;
            font-size: 52px;
            font-weight: 500;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
    <div class="clip" data-composition-id="beat-1" data-width="1920" data-height="1080">
        <div class="hook-text" id="hookLine">那天我问了个问题</div>
        <div class="white-bg" id="whiteBg">
            <div class="question-gray">什么东西比 10 亿更有价值？</div>
        </div>
        <div class="watermark">✧ 智作 | 你的品牌</div>
    </div>
    <script>
        (function () {
            const compositionId = document.querySelector('.clip').getAttribute('data-composition-id');
            window.__timelines = window.__timelines || {};
            const tl = gsap.timeline({ paused: true });
            // 修复重叠：合并为一个连续动画，不使用重叠的 tween
            tl.fromTo("#hookLine",
                { opacity: 0, scale: 0.8 },
                { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.2)", overwrite: true }
            );
            tl.to("#hookLine", { opacity: 0, duration: 0.4, overwrite: true }, "+=1.0");
            tl.to("#whiteBg", { opacity: 1, duration: 0.4 }, "+=0.2");
            window.__timelines[compositionId] = tl;
        })();
    </script>
</body>

</html>
