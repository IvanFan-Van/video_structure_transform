    <div id="beat-2-hook-question-glow-1" class="clip" data-start="0" data-duration="0.77" data-track-index="1" style="position: absolute; top: 20%; left: 20%; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%); transform: translate(-50%, -50%);"></div>
    
    <!-- 装饰径向光晕2 -->
    <div id="beat-2-hook-question-glow-2" class="clip" data-start="0" data-duration="0.77" data-track-index="2" style="position: absolute; top: 70%; left: 75%; width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); transform: translate(-50%, -50%);"></div>
    
    <!-- 装饰径向光晕3 -->
    <div id="beat-2-hook-question-glow-3" class="clip" data-start="0" data-duration="0.77" data-track-index="3" style="position: absolute; top: 35%; left: 80%; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); transform: translate(-50%, -50%);"></div>
    
    <!-- 装饰径向光晕4 -->
    <div id="beat-2-hook-question-glow-4" class="clip" data-start="0" data-duration="0.77" data-track-index="4" style="position: absolute; top: 65%; left: 15%; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%); transform: translate(-50%, -50%);"></div>
    
    <!-- 装饰径向光晕5 -->
    <div id="beat-2-hook-question-glow-5" class="clip" data-start="0" data-duration="0.77" data-track-index="5" style="position: absolute; top: 15%; left: 50%; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%); transform: translate(-50%, -50%);"></div>
    
    <!-- 核心设问文字 -->
    <div id="beat-2-hook-question-title" class="clip" data-start="0.1" data-duration="0.77" data-track-index="6" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Noto Serif SC', serif; font-size: 5rem; font-weight: 700; color: #888888; text-align: center; line-height: 1.4; width: 90%;">什么东西比10亿更有价值？</div>
    
    <!-- 底部品牌水印 -->
    <div id="beat-2-hook-question-watermark" class="clip" data-start="0" data-duration="0.77" data-track-index="7" style="position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%); font-family: 'Noto Serif SC', serif; font-size: 1rem; font-weight: 500; color: #888888; opacity: 0;">wuqr</div>

    <script>
      const tl = gsap.timeline({ paused: true });
      const duration = 0.77;

      // 背景从黑到白交叉淡入
      tl.fromTo("#beat-2-hook-question-bg", 
        { backgroundColor: "#000000" },
        { backgroundColor: "#FFFFFF", duration: 0.2, ease: "none" },
        0
      );

      // 水印淡入
      tl.fromTo("#beat-2-hook-question-watermark",
        { opacity: 0 },
        { opacity: 0.7, duration: 0.25, ease: "power2.out" },
        0.05
      );

      // 设问文字带模糊淡入 Ghost Type 效果
      tl.fromTo("#beat-2-hook-question-title",
        { opacity: 0, filter: "blur(24px)", y: 30 },
        { opacity: 1, filter: "blur(0px)", y: 0, duration: 0.3, ease: "power3.out" },
        0.1
      );

      // 光晕1 呼吸循环动画
      tl.fromTo("#beat-2-hook-question-glow-1",
        { scale: 0.8, opacity: 0.6 },
        { scale: 1.2, opacity: 1, duration: 0.4, ease: "sine.inOut", repeat: Math.floor(duration / 0.4) - 1, yoyo: true },
        0
      );

      // 光晕2 呼吸循环动画
      tl.fromTo("#beat-2-hook-question-glow-2",
        { scale: 0.9, opacity: 0.5 },
        { scale: 1.1, opacity: 0.9, duration: 0.35, ease: "sine.inOut", repeat: Math.floor(duration / 0.35) - 1, yoyo: true },
        0.05
      );

      // 光晕3 呼吸循环动画
      tl.fromTo("#beat-2-hook-question-glow-3",
        { scale: 0.75, opacity: 0.55 },
        { scale: 1.25, opacity: 0.95, duration: 0.45, ease: "sine.inOut", repeat: Math.floor(duration / 0.45) - 1, yoyo: true },
        0.1
      );

      // 光晕4 呼吸循环动画
      tl.fromTo("#beat-2-hook-question-glow-4",
        { scale: 0.85, opacity: 0.45 },
        { scale: 1.15, opacity: 0.85, duration: 0.38, ease: "sine.inOut", repeat: Math.floor(duration / 0.38) - 1, yoyo: true },
        0.02
      );

      // 光晕5 呼吸循环动画
      tl.fromTo("#beat-2-hook-question-glow-5",
        { scale: 0.92, opacity: 0.4 },
        { scale: 1.08, opacity: 0.7, duration: 0.5, ease: "sine.inOut", repeat: Math.floor(duration / 0.5) - 1, yoyo: true },
        0.08
      );

      window.__timelines = window.__timelines || {};
      window.__timelines["beat-2-hook-question"] = tl;
    </script>
  </div>
