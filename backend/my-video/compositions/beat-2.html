<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .clip {
            position: relative;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: #000;
        }

        .watermark {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 100;
            pointer-events: none;
        }

        .card {
            position: absolute;
            left: 50%;
            width: 360px;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 24px 20px;
            text-align: center;
            color: white;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: translateX(-50%) translateY(-50%);
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.5));
        }

        /* 红色细绳（伪元素模拟） */
        .card::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: #FF3333;
            transform: translateX(-50%);
        }

        /* 轻微晃动动画 */
        @keyframes sway {
            0% {
                transform: translateX(-50%) translateY(-50%) rotate(0deg);
            }

            30% {
                transform: translateX(-50%) translateY(-50%) rotate(1deg);
            }

            70% {
                transform: translateX(-50%) translateY(-50%) rotate(-1deg);
            }

            100% {
                transform: translateX(-50%) translateY(-50%) rotate(0deg);
            }
        }

        .sway {
            animation: sway 2s ease-in-out infinite;
        }

        .card1 {
            top: 25%;
        }

        .card2 {
            top: 50%;
        }

        .card3 {
            top: 75%;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
    <div class="clip" data-start="2.5" data-duration="2.3" data-beat="2">
        <div class="card card1" id="card1">友谊</div>
        <div class="card card2" id="card2">时光</div>
        <div class="card card3" id="card3">自由</div>
        <div class="watermark">✧ 智作 | 你的品牌</div>
    </div>
    <script>
        const tl = gsap.timeline({ repeat: 0, paused: false });
        // 依次出现卡片
        tl.fromTo("#card1", { opacity: 0, y: -80 }, { opacity: 1, y: 0, duration: 0.5, ease: "bounce.out" })
            .call(() => document.getElementById("card1").classList.add("sway"));
        tl.fromTo("#card2", { opacity: 0, y: -80 }, { opacity: 1, y: 0, duration: 0.5, ease: "bounce.out" }, "+=0.3")
            .call(() => document.getElementById("card2").classList.add("sway"));
        tl.fromTo("#card3", { opacity: 0, y: -80 }, { opacity: 1, y: 0, duration: 0.5, ease: "bounce.out" }, "+=0.3")
            .call(() => document.getElementById("card3").classList.add("sway"));
        // 轻微镜头推近 (对 .clip 进行 scale)
        tl.to(".clip", { scale: 1.04, duration: 1.8, ease: "power1.inOut" }, "+=0.2");
    </script>
</body>

</html>
