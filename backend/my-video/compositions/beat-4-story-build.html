<template id="beat-4-story-build-template">
  <div 
    class="composition"
    data-composition-id="beat-4-story-build"
    data-width="1080"
    data-height="1920"
    style="width: 100%; height: 100%; position: relative; overflow: hidden; background-color: #000000;"
  >
    <!-- 纯黑背景层 -->
    <div 
      id="beat-4-story-build-bg"
      class="clip"
      data-start="0"
      data-duration="2.43"
      data-track-index="0"
      style="width: 100%; height: 100%; background-color: #000000; position: absolute; top: 0; left: 0;"
    ></div>

    <!-- 装饰径向光晕1 -->
    <div 
      id="beat-4-story-build-glow-1"
      class="clip"
      data-start="0"
      data-duration="2.43"
      data-track-index="1"
      style="width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(255,34,34,0.15) 0%, transparent 70%); position: absolute; top: 600px; left: 340px; filter: blur(60px);"
    ></div>

    <!-- 装饰径向光晕2 -->
    <div 
      id="beat-4-story-build-glow-2"
      class="clip"
      data-start="0"
      data-duration="2.43"
      data-track-index="2"
      style="width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); position: absolute; top: 1000px; left: 390px; filter: blur(50px);"
    ></div>

    <!-- 第一行文字 -->
    <div 
      id="beat-4-story-build-line1"
      class="clip"
      data-start="0.1"
      data-duration="2.43"
      data-track-index="3"
      style="position: absolute; top: 880px; left: 50%; transform: translateX(-50%); font-family: 'Noto Serif SC', serif; font-size: 88px; font-weight: 700; color: #FFFFFF; text-align: center; white-space: nowrap;"
    >直到有一天，一个</div>

    <!-- 红色高亮背景块 -->
    <div 
      id="beat-4-story-build-highlight-block"
      class="clip"
      data-start="0.3"
      data-duration="2.43"
      data-track-index="4"
      style="position: absolute; top: 872px; left: 570px; width: 180px; height: 110px; background-color: #FF2222; border-radius: 16px; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 24px rgba(255,34,34,0.6));"
    ></div>

    <!-- 高亮文字“傻子” -->
    <div 
      id="beat-4-story-build-highlight-text"
      class="clip"
      data-start="0.35"
      data-duration="2.43"
      data-track-index="5"
      style="position: absolute; top: 880px; left: 590px; font-family: 'Noto Serif SC', serif; font-size: 88px; font-weight: 700; color: #FFFFFF; text-align: center; white-space: nowrap;"
    >傻子</div>

    <!-- 第二行文字 -->
    <div 
      id="beat-4-story-build-line2"
      class="clip"
      data-start="0.7"
      data-duration="2.43"
      data-track-index="6"
      style="position: absolute; top: 1020px; left: 50%; transform: translateX(-50%); font-family: 'Noto Serif SC', serif; font-size: 88px; font-weight: 700; color: #FFFFFF; text-align: center; white-space: nowrap;"
    >回答道</div>

    <!-- 底部品牌水印 -->
    <div 
      id="beat-4-story-build-watermark"
      class="clip"
      data-start="0"
      data-duration="2.43"
      data-track-index="7"
      style="position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%); font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 500; color: #888888; letter-spacing: 8px;"
    >WUQR</div>

    <script>
      const tl = gsap.timeline({ paused: true });
      const duration = 2.43;

      // 第一行文字入场
      tl.fromTo("#beat-4-story-build-line1", 
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
        0.1
      );

      // 红色高亮块缩放入场
      tl.fromTo("#beat-4-story-build-highlight-block",
        { scale: 0, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.3, ease: "power3.out" },
        0.3
      );

      // 高亮文字入场
      tl.fromTo("#beat-4-story-build-highlight-text",
        { scale: 0.8, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.25, ease: "back.out(1.3)" },
        0.35
      );

      // 第二行文字入场
      tl.fromTo("#beat-4-story-build-line2",
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
        0.9
      );

      // 光晕1 ambient呼吸循环
      tl.fromTo("#beat-4-story-build-glow-1",
        { scale: 1, opacity: 0.6 },
        { scale: 1.3, opacity: 1, duration: 1.2, ease: "sine.inOut", repeat: Math.floor(duration / 1.2) - 1, yoyo: true },
        0
      );

      // 光晕2 ambient漂移循环
      tl.fromTo("#beat-4-story-build-glow-2",
        { x: -20, opacity: 0.5 },
        { x: 20, opacity: 0.9, duration: 1.5, ease: "sine.inOut", repeat: Math.floor(duration / 1.5) - 1, yoyo: true },
        0
      );

      // 统一向上退场过渡
      tl.to([
        "#beat-4-story-build-line1",
        "#beat-4-story-build-highlight-block",
        "#beat-4-story-build-highlight-text",
        "#beat-4-story-build-line2"
      ], {
        y: -150,
        filter: "blur(30px)",
        duration: 0.33,
        ease: "power2.in"
      }, 2.1);

      window.__timelines = window.__timelines || {};
      window.__timelines["beat-4-story-build"] = tl;
    </script>
  </div>
</template>
