  <script>
    const tl = gsap.timeline({ paused: true });
    const duration = 2.4;

    // 吊牌依次下落入场动画
    tl.fromTo("#beat-3-card-1", 
      { y: 0, rotation: -8 },
      { y: 320, rotation: 0, duration: 0.5, ease: "bounce.out" },
      0.1
    );
    tl.fromTo("#beat-3-card-2",
      { y: 0, rotation: 5 },
      { y: 320, rotation: 0, duration: 0.5, ease: "bounce.out" },
      0.25
    );
    tl.fromTo("#beat-3-card-3",
      { y: 0, rotation: -5 },
      { y: 320, rotation: 0, duration: 0.5, ease: "bounce.out" },
      0.4
    );

    // 光晕 ambient 呼吸循环
    tl.to("#beat-3-glow-1", {
      opacity: 0.6,
      scale: 1.2,
      duration: 1.2,
      ease: "sine.inOut",
      repeat: Math.floor(duration / 1.2) - 1,
      yoyo: true
    }, 0.6);
    tl.to("#beat-3-glow-2", {
      opacity: 0.6,
      scale: 1.2,
      duration: 1.2,
      ease: "sine.inOut",
      repeat: Math.floor(duration / 1.2) - 1,
      yoyo: true
    }, 0.7);
    tl.to("#beat-3-glow-3", {
      opacity: 0.6,
      scale: 1.2,
      duration: 1.2,
      ease: "sine.inOut",
      repeat: Math.floor(duration / 1.2) - 1,
      yoyo: true
    }, 0.8);

    // 吊牌轻微摇摆 ambient 动画
    tl.to("#beat-3-card-1", {
      rotation: 3,
      duration: 1.0,
      ease: "sine.inOut",
      repeat: Math.floor(duration / 1.0) - 1,
      yoyo: true
    }, 0.7);
    tl.to("#beat-3-card-2", {
      rotation: -2,
      duration: 1.1,
      ease: "sine.inOut",
      repeat: Math.floor(duration / 1.1) - 1,
      yoyo: true
    }, 0.75);
    tl.to("#beat-3-card-3", {
      rotation: 2,
      duration: 0.9,
      ease: "sine.inOut",
      repeat: Math.floor(duration / 0.9) - 1,
      yoyo: true
    }, 0.8);

    // 统一向上退场动画
    tl.to(["#beat-3-card-1", "#beat-3-card-2", "#beat-3-card-3"], {
      y: "-150%",
      filter: "blur(30px)",
      duration: 0.33,
      ease: "power2.in"
    }, 2.07);

    window.__timelines = window.__timelines || {};
      window.__timelines["beat-3-value-cards"] = tl;
  </script>
