<template id="beat-3-climax-template">
  <div class="composition" data-composition-id="beat-3-climax" data-width="1080" data-height="1920" style="width: 100%; height: 100%; position: relative; overflow: hidden; background: #000;">
    <!-- 纯黑基底背景 -->
    <div id="beat-3-climax-bg" class="clip" data-start="0" data-duration="2.3" data-track-index="0" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: #000000;"></div>
    
    <!-- RGB故障背景层 -->
    <div id="beat-3-climax-bg-r" class="clip" data-start="0" data-duration="2.3" data-track-index="1" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: rgba(255,32,32,0.08); opacity: 0;"></div>
    <div id="beat-3-climax-bg-g" class="clip" data-start="0" data-duration="2.3" data-track-index="2" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: rgba(32,255,32,0.08); opacity: 0;"></div>
    <div id="beat-3-climax-bg-b" class="clip" data-start="0" data-duration="2.3" data-track-index="3" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: rgba(32,32,255,0.08); opacity: 0;"></div>

    <!-- 核心主文字层 -->
    <div id="beat-3-climax-main-text" class="clip" data-start="0.1" data-duration="2.2" data-track-index="4" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Noto Serif SC', serif; font-size: 8rem; font-weight: 700; color: #FFFFFF; text-shadow: 0 0 40px rgba(255,255,255,0.8); opacity: 0; scale: 0;">11亿</div>
    
    <!-- RGB故障文字层 -->
    <div id="beat-3-climax-text-r" class="clip" data-start="0.1" data-duration="2.2" data-track-index="5" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Noto Serif SC', serif; font-size: 8rem; font-weight: 700; color: #FF2020; opacity: 0.7; x: 0; y: 0;">11亿</div>
    <div id="beat-3-climax-text-g" class="clip" data-start="0.1" data-duration="2.2" data-track-index="6" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Noto Serif SC', serif; font-size: 8rem; font-weight: 700; color: #00FF20; opacity: 0.7; x: 0; y: 0;">11亿</div>
    <div id="beat-3-climax-text-b" class="clip" data-start="0.1" data-duration="2.2" data-track-index="7" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Noto Serif SC', serif; font-size: 8rem; font-weight: 700; color: #2020FF; opacity: 0.7; x: 0; y: 0;">11亿</div>

    <!-- 底部品牌标识 -->
    <div id="beat-3-climax-brand" class="clip" data-start="0" data-duration="2.3" data-track-index="8" style="position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%); font-family: 'UnifrakturMaguntia', serif; font-size: 1rem; color: #F8F8F8; opacity: 0.9;">wuqr</div>
  </div>

  <script>
    const tl = gsap.timeline({ paused: true });
    const duration = 2.3;

    // 核心数字爆点入场动画
    tl.fromTo("#beat-3-climax-main-text", 
      { opacity: 0, scale: 0.3, filter: "blur(20px)" },
      { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.2, ease: "expo.out" },
      0.1
    );

    // 主文字柔光呼吸 ambient loop
    tl.to("#beat-3-climax-main-text",
      { textShadow: "0 0 60px rgba(255,255,255,1)", duration: 0.5, ease: "sine.inOut", repeat: Math.floor(duration / 1) - 1, yoyo: true },
      0.3
    );

    // RGB故障特效触发
    tl.to(["#beat-3-climax-bg-r", "#beat-3-climax-bg-g", "#beat-3-climax-bg-b"],
      { opacity: 1, duration: 0.1, ease: "power3.out" },
      0.3
    );
    tl.to("#beat-3-climax-text-r",
      { x: 24, duration: 0.4, ease: "power2.out" },
      0.3
    );
    tl.to("#beat-3-climax-text-g",
      { y: 24, duration: 0.4, ease: "power2.out" },
      0.3
    );
    tl.to("#beat-3-climax-text-b",
      { x: -24, duration: 0.4, ease: "power2.out" },
      0.3
    );
    tl.to("#beat-3-climax-bg-r", { x: 18, duration: 0.4, ease: "power2.out" }, 0.3);
    tl.to("#beat-3-climax-bg-g", { y: 18, duration: 0.4, ease: "power2.out" }, 0.3);
    tl.to("#beat-3-climax-bg-b", { x: -18, duration: 0.4, ease: "power2.out" }, 0.3);

    // 故障特效复位
    tl.to(["#beat-3-climax-text-r", "#beat-3-climax-text-g", "#beat-3-climax-text-b"],
      { x: 0, y: 0, duration: 0.4, ease: "power2.in" },
      0.7
    );
    tl.to(["#beat-3-climax-bg-r", "#beat-3-climax-bg-g", "#beat-3-climax-bg-b"],
      { x: 0, y: 0, opacity: 0, duration: 0.4, ease: "power2.in" },
      0.7
    );

    // 闪白过渡帧
    tl.to("#beat-3-climax-bg",
      { backgroundColor: "#FFFFFF", duration: 0.05, ease: "none" },
      1.7
    );
    tl.to("#beat-3-climax-bg",
      { backgroundColor: "#000000", duration: 0.05, ease: "none" },
      1.75
    );

    // 向上速度匹配出场过渡
    tl.to(["#beat-3-climax-main-text", "#beat-3-climax-text-r", "#beat-3-climax-text-g", "#beat-3-climax-text-b", "#beat-3-climax-brand"],
      { y: -200, filter: "blur(40px)", opacity: 0, duration: 0.25, ease: "power2.in" },
      2.05
    );

    window.__timelines = window.__timelines || {};
      window.__timelines["beat-3-climax"] = tl;
  </script>
</template>
