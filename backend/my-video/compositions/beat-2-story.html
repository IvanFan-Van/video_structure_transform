<template id="beat-2-story-template">
  <div class="composition" data-composition-id="beat-2-story" data-width="1080" data-height="1920" style="width: 100%; height: 100%; position: relative; overflow: hidden; background-color: #000000;">
    <!-- 纯黑背景层 -->
    <div id="beat-2-story-bg" class="clip" data-start="0" data-duration="2.5" data-track-index="0" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: #000000;"></div>
    
    <!-- 中心径向光晕层 -->
    <div id="beat-2-story-radial-glow" class="clip" data-start="0" data-duration="2.5" data-track-index="1" style="width: 700px; height: 700px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%); opacity: 0.2;"></div>
    
    <!-- 铺垫文字第一部分：直到有一天 -->
    <div id="beat-2-story-text-part1" class="clip" data-start="0.1" data-duration="2.4" data-track-index="2" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Noto Serif SC', serif; font-size: 5rem; font-weight: 700; color: #FFFFFF; text-align: center; white-space: nowrap; text-shadow: 0 0 24px rgba(255,255,255,0.3);">
      直到有一天，一个
    </div>
    
    <!-- 红色高亮衬底 -->
    <div id="beat-2-story-red-bg-tag" class="clip" data-start="0.7" data-duration="1.8" data-track-index="3" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, 120px); width: 220px; height: 110px; background-color: #FF2020; border-radius: 16px; opacity: 0;"></div>
    
    <!-- 高亮关键词：傻子 -->
    <div id="beat-2-story-highlight-word" class="clip" data-start="0.7" data-duration="1.8" data-track-index="4" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, 120px); font-family: 'Noto Serif SC', serif; font-size: 5rem; font-weight: 700; color: #FFFFFF; text-align: center; white-space: nowrap; text-shadow: 0 0 32px rgba(255,32,32,0.6); opacity: 0;">
      “傻子”
    </div>
    
    <!-- 后续文字：回答道 -->
    <div id="beat-2-story-text-part2" class="clip" data-start="1.3" data-duration="1.2" data-track-index="5" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, 240px); font-family: 'Noto Serif SC', serif; font-size: 5rem; font-weight: 700; color: #FFFFFF; text-align: center; white-space: nowrap; text-shadow: 0 0 24px rgba(255,255,255,0.3); opacity: 0;">
      回答道
    </div>
    
    <!-- 装饰光点1 -->
    <div id="beat-2-story-deco-dot-1" class="clip" data-start="0" data-duration="2.5" data-track-index="6" style="width: 12px; height: 12px; position: absolute; top: 320px; left: 180px; border-radius: 50%; background-color: #FF2020; opacity: 0.6;"></div>
    
    <!-- 装饰光点2 -->
    <div id="beat-2-story-deco-dot-2" class="clip" data-start="0" data-duration="2.5" data-track-index="7" style="width: 16px; height: 16px; position: absolute; bottom: 420px; right: 160px; border-radius: 50%; background-color: #FFFFFF; opacity: 0.4;"></div>
    
    <!-- 装饰光点3 -->
    <div id="beat-2-story-deco-dot-3" class="clip" data-start="0" data-duration="2.5" data-track-index="8" style="width: 8px; height: 8px; position: absolute; top: 720px; right: 220px; border-radius: 50%; background-color: #FF2020; opacity: 0.5;"></div>
    
    <!-- 底部固定品牌标识 -->
    <div id="beat-2-story-brand-mark" class="clip" data-start="0" data-duration="2.5" data-track-index="9" style="position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-family: 'UnifrakturMaguntia', serif; font-size: 1rem; font-weight: 500; color: #F8F8F8; letter-spacing: 2px;">
      wuqr
    </div>
  </div>

  <script>
    const tl = gsap.timeline({ paused: true });
    const duration = 2.5;

    // 铺垫文字入场放大动画
    tl.fromTo("#beat-2-story-text-part1", 
      { scale: 0.3, opacity: 0 },
      { scale: 1, opacity: 1, duration: 0.6, ease: "sine.inOut" },
      0.1
    );

    // 背景光晕亮度提升动画
    tl.fromTo("#beat-2-story-radial-glow",
      { opacity: 0.2 },
      { opacity: 0.7, duration: 0.6, ease: "sine.inOut" },
      0.1
    );

    // 红色高亮衬底猛击入场
    tl.fromTo("#beat-2-story-red-bg-tag",
      { scale: 0, opacity: 0, rotation: -8 },
      { scale: 1, opacity: 1, rotation: 0, duration: 0.3, ease: "power3.out" },
      0.7
    );

    // 高亮关键词入场
    tl.fromTo("#beat-2-story-highlight-word",
      { scale: 0, opacity: 0 },
      { scale: 1.1, opacity: 1, duration: 0.3, ease: "power3.out" },
      0.75
    );
    tl.to("#beat-2-story-highlight-word",
      { scale: 1, duration: 0.15, ease: "power2.out" },
      1.05
    );

    // 后续文字入场
    tl.fromTo("#beat-2-story-text-part2",
      { scale: 0.4, opacity: 0, y: -40 },
      { scale: 1, opacity: 1, y: 0, duration: 0.3, ease: "power3.out" },
      1.3
    );

    // 装饰光点1呼吸循环动画
    tl.to("#beat-2-story-deco-dot-1",
      { scale: 1.8, opacity: 1, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: Math.floor(duration / 1.2) - 1 },
      0
    );

    // 装饰光点2漂移循环动画
    tl.to("#beat-2-story-deco-dot-2",
      { x: 30, y: -20, opacity: 0.8, duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: Math.floor(duration / 1.6) - 1 },
      0
    );

    // 装饰光点3脉冲循环动画
    tl.to("#beat-2-story-deco-dot-3",
      { scale: 2.2, opacity: 0.9, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: Math.floor(duration / 1) - 1 },
      0
    );

    window.__timelines = window.__timelines || {};
      window.__timelines["beat-2-story"] = tl;
  </script>
</template>
