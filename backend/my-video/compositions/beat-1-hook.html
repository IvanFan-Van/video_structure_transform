<template id="beat-1-hook-template">
  <div class="composition" data-composition-id="beat-1-hook" data-width="1080" data-height="1920" style="width: 100%; height: 100%; position: relative; overflow: hidden; background-color: #000000;">
    <!-- 背景层 带径向呼吸光晕 -->
    <div id="beat-1-hook-bg" class="clip" data-start="0.0" data-duration="5.0" data-track-index="0" style="position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 60%); transform: scale(1);"></div>
    
    <!-- 主标题 -->
    <div id="beat-1-hook-title" class="clip" data-start="0.1" data-duration="4.9" data-track-index="1" style="position: absolute; top: 280px; left: 50%; transform: translateX(-50%) translateY(-120px); font-family: 'Noto Serif SC', serif; font-size: 5rem; font-weight: 700; color: #FFFFFF; text-align: center; opacity: 0; text-shadow: 0 0 32px rgba(255,255,255,0.3);">
      什么比<span style="color:#FF2020; text-shadow: 0 0 32px rgba(255,32,32,0.6);">10亿</span>更有价值？
    </div>

    <!-- 吊牌1 友谊 -->
    <div id="beat-1-hook-tag-1" class="clip" data-start="0.8" data-duration="4.2" data-track-index="2" style="position: absolute; top: -120px; left: 220px; width: 180px; height: 80px; background: #FFFFFF; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans SC', sans-serif; font-size: 2rem; font-weight: 700; color: #FF2020; transform: rotate(-8deg);">
      <div style="position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 2px; height: 60px; background-color: #FF2020;"></div>
      友谊
    </div>

    <!-- 吊牌2 时光 -->
    <div id="beat-1-hook-tag-2" class="clip" data-start="1.5" data-duration="3.5" data-track-index="3" style="position: absolute; top: -120px; left: 50%; transform: translateX(-50%) rotate(3deg); width: 180px; height: 80px; background: #FFFFFF; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans SC', sans-serif; font-size: 2rem; font-weight: 700; color: #FF2020;">
      <div style="position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 2px; height: 60px; background-color: #FF2020;"></div>
      时光
    </div>

    <!-- 吊牌3 自由 -->
    <div id="beat-1-hook-tag-3" class="clip" data-start="2.2" data-duration="2.8" data-track-index="4" style="position: absolute; top: -120px; right: 220px; width: 180px; height: 80px; background: #FFFFFF; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans SC', sans-serif; font-size: 2rem; font-weight: 700; color: #FF2020; transform: rotate(8deg);">
      <div style="position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 2px; height: 60px; background-color: #FF2020;"></div>
      自由
    </div>

    <!-- 数字闪切元素 -->
    <div id="beat-1-hook-digits" class="clip" data-start="2.66" data-duration="0.14" data-track-index="5" style="position: absolute; top: 900px; left: 50%; transform: translateX(-50%); font-family: 'Noto Sans SC', sans-serif; font-size: 8rem; font-weight: 900; color: #FF2020; opacity: 0;">
      24 26 30
    </div>

    <!-- 装饰性红色光晕 -->
    <div id="beat-1-hook-accent-glow" class="clip" data-start="0.0" data-duration="5.0" data-track-index="6" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(255,32,32,0.06) 0%, transparent 70%);"></div>

    <!-- 底部品牌标识 -->
    <div id="beat-1-hook-brand" class="clip" data-start="0.0" data-duration="5.0" data-track-index="7" style="position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%); font-family: 'UnifrakturMaguntia', serif; font-size: 1rem; color: #F8F8F8; opacity: 0.9;">
      wuqr
    </div>
  </div>

  <script>
    const tl = gsap.timeline({ paused: true });
    const duration = 5.0;

    // 背景光晕呼吸循环
    tl.fromTo("#beat-1-hook-bg", { scale: 1 }, {
      scale: 1.1,
      duration: 3,
      ease: "sine.inOut",
      yoyo: true,
      repeat: Math.floor(duration / 3) - 1
    }, 0);

    // 红色装饰光晕呼吸循环
    tl.fromTo("#beat-1-hook-accent-glow", { scale: 0.8, opacity: 0.6 }, {
      scale: 1.2,
      opacity: 1,
      duration: 2.5,
      ease: "sine.inOut",
      yoyo: true,
      repeat: Math.floor(duration / 2.5) - 1
    }, 0);

    // 主标题重击入场
    tl.fromTo("#beat-1-hook-title", { y: -180, opacity: 0, rotation: -2 }, {
      y: 0,
      opacity: 1,
      rotation: 0,
      duration: 0.4,
      ease: "power3.out"
    }, 0.1);

    // 吊牌1 友谊下落
    tl.fromTo("#beat-1-hook-tag-1", { y: 0, rotation: -15 }, {
      y: 320,
      rotation: -8,
      duration: 0.5,
      ease: "power3.out"
    }, 0.8);

    // 吊牌2 时光下落
    tl.fromTo("#beat-1-hook-tag-2", { y: 0, rotation: 10 }, {
      y: 360,
      rotation: 3,
      duration: 0.5,
      ease: "power3.out"
    }, 1.5);

    // 吊牌3 自由下落
    tl.fromTo("#beat-1-hook-tag-3", { y: 0, rotation: 15 }, {
      y: 320,
      rotation: 8,
      duration: 0.5,
      ease: "power3.out"
    }, 2.2);

    // 数字闪切爆闪效果
    tl.to("#beat-1-hook-digits", {
      opacity: 1,
      scale: 1.2,
      duration: 0.04,
      ease: "power2.out"
    }, 2.66);
    tl.to("#beat-1-hook-digits", {
      opacity: 0,
      scale: 0.9,
      duration: 0.1,
      ease: "power2.in"
    }, 2.7);

    // 品牌标识淡入固定
    tl.fromTo("#beat-1-hook-brand", { opacity: 0, y: 20 }, {
      opacity: 0.9,
      y: 0,
      duration: 0.3,
      ease: "power2.out"
    }, 0.2);

    // 整体出场过渡 向上速度匹配
    tl.to([
      "#beat-1-hook-title",
      "#beat-1-hook-tag-1",
      "#beat-1-hook-tag-2",
      "#beat-1-hook-tag-3"
    ], {
      y: -180,
      filter: "blur(35px)",
      opacity: 0,
      duration: 0.35,
      ease: "power2.in"
    }, 4.65);

    window.__timelines = window.__timelines || {};
      window.__timelines["beat-1-hook"] = tl;
  </script>
</template>
