<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>爆款结构迁移 — 合成视频</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- ★ root composition 必须有 data-start="0" -->
  <div
    id="root-composition"
    data-composition-id="root"
    data-start="0"
    data-duration="20.10"
    data-width="1080"
    data-height="1920"
  >
    <div
      id="beat-clip-1"
      data-composition-id="beat-1-hook-opening"
      data-composition-src="compositions/beat-1-hook-opening.html"
      data-start="0.0"
      data-duration="1.7"
      data-width="1080"
      data-height="1920"
      data-track-index="1"
    ></div>
    <div
      id="beat-clip-2"
      data-composition-id="beat-2-hook-question"
      data-composition-src="compositions/beat-2-hook-question.html"
      data-start="1.7"
      data-duration="0.77"
      data-width="1080"
      data-height="1920"
      data-track-index="2"
    ></div>
    <div
      id="beat-clip-3"
      data-composition-id="beat-3-value-cards"
      data-composition-src="compositions/beat-3-value-cards.html"
      data-start="2.47"
      data-duration="2.4"
      data-width="1080"
      data-height="1920"
      data-track-index="3"
    ></div>
    <div
      id="beat-clip-4"
      data-composition-id="beat-4-story-build"
      data-composition-src="compositions/beat-4-story-build.html"
      data-start="4.87"
      data-duration="2.43"
      data-width="1080"
      data-height="1920"
      data-track-index="4"
    ></div>
    <div
      id="beat-clip-5"
      data-composition-id="beat-5-punchline-11yi"
      data-composition-src="compositions/beat-5-punchline-11yi.html"
      data-start="7.3"
      data-duration="2.57"
      data-width="1080"
      data-height="1920"
      data-track-index="5"
    ></div>
    <div
      id="beat-clip-6"
      data-composition-id="beat-6-proof-scroll"
      data-composition-src="compositions/beat-6-proof-scroll.html"
      data-start="9.87"
      data-duration="7.63"
      data-width="1080"
      data-height="1920"
      data-track-index="6"
    ></div>
    <div
      id="beat-clip-7"
      data-composition-id="beat-7-cta-conclusion"
      data-composition-src="compositions/beat-7-cta-conclusion.html"
      data-start="17.5"
      data-duration="2.6"
      data-width="1080"
      data-height="1920"
      data-track-index="7"
    ></div>    <audio
      id="el-audio-0"
      data-start="0"
      data-duration="20.10"
      data-track-index="8"
      data-volume="1.0"
      src="audio_file/temp_audio.wav"
    ></audio>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // 根时间线：各 beat sub-composition 各自管理自己的 timeline
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["root"] = tl;
    </script>
  </div>
</body>
</html>
